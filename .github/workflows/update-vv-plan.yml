name: Update V&V Plan

# Runs on every PR to main. Executes all seven test suites, updates section 13
# of docs/vv-test-plan.md with real pass/fail results, then commits the file
# back to the PR branch.
#
# Fast suites (Python unit, integration, JS unit, skills) run against the
# GitHub Actions MySQL service directly.
#
# E2E and Browser suites require a running Docker prod stack — the workflow
# builds and starts the prod stack (nginx + gunicorn + MySQL 8.0) exactly as
# the main CI pipeline does, then tears it down after tests finish.
#
# The bot commit uses [skip ci] to prevent an infinite trigger loop.

on:
  pull_request:
    branches: [main]

jobs:
  update-vv-plan:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit back to the PR branch

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testroot
          MYSQL_DATABASE: radiocalico_test
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      # ── Checkout the PR branch (not the merge commit) so we can push back ──
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      # Chrome is installed early so it's available for the browser test step
      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install Python dependencies
        run: pip install -r api/requirements.txt -r api/requirements-dev.txt

      - name: Install Node.js dependencies
        run: npm ci

      # ── Fast suites — run directly against the MySQL service ──────────────

      - name: Python unit tests
        id: python_unit
        working-directory: api
        env:
          DB_HOST: 127.0.0.1
          DB_USER: testuser
          DB_PASSWORD: testpass
          DB_NAME: radiocalico_test
        run: |
          if pytest test_app.py -q --tb=no; then
            echo "result=pass" >> "$GITHUB_OUTPUT"
          else
            echo "result=fail" >> "$GITHUB_OUTPUT"
          fi
        continue-on-error: true

      - name: Python integration tests
        id: integration
        working-directory: api
        env:
          DB_HOST: 127.0.0.1
          DB_USER: testuser
          DB_PASSWORD: testpass
          DB_NAME: radiocalico_test
        run: |
          if pytest test_integration.py -q --tb=no; then
            echo "result=pass" >> "$GITHUB_OUTPUT"
          else
            echo "result=fail" >> "$GITHUB_OUTPUT"
          fi
        continue-on-error: true

      - name: JavaScript unit tests
        id: js
        run: |
          if npx jest --no-coverage --silent; then
            echo "result=pass" >> "$GITHUB_OUTPUT"
          else
            echo "result=fail" >> "$GITHUB_OUTPUT"
          fi
        continue-on-error: true

      - name: Skills and agents tests
        id: skills
        run: |
          if pytest tests/test_skills.py -q --tb=no; then
            echo "result=pass" >> "$GITHUB_OUTPUT"
          else
            echo "result=fail" >> "$GITHUB_OUTPUT"
          fi
        continue-on-error: true

      # ── Docker prod stack — required for E2E and Browser tests ────────────

      - name: Create .env for Docker prod
        run: |
          cat > .env << 'ENVEOF'
          MYSQL_ROOT_PASSWORD=vvroot
          DB_HOST=db
          DB_USER=vvuser
          DB_PASSWORD=vvpass
          DB_NAME=radiocalico
          CORS_ORIGIN=*
          APP_PORT=5050
          ENVEOF

      - name: Start production stack
        run: docker compose --profile prod up --build -d db app nginx

      - name: Wait for prod stack to be healthy
        id: stack_health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:5050/health > /dev/null 2>&1; then
              echo "App is healthy"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 5
          done
          echo "Prod stack did not become healthy within 150s"
          docker compose --profile prod logs
          exit 1
        continue-on-error: true

      # ── E2E tests (HTTP against nginx → gunicorn → MySQL) ─────────────────

      - name: E2E tests
        id: e2e
        if: steps.stack_health.outcome == 'success'
        env:
          E2E_BASE_URL: http://127.0.0.1:5050
        run: |
          pip install requests pytest
          if pytest tests/test_e2e.py -q --tb=no; then
            echo "result=pass" >> "$GITHUB_OUTPUT"
          else
            echo "result=fail" >> "$GITHUB_OUTPUT"
          fi
        continue-on-error: true

      # ── Browser tests (Selenium + headless Chrome) ────────────────────────

      - name: Browser tests
        id: browser
        if: steps.stack_health.outcome == 'success'
        env:
          E2E_BASE_URL: http://127.0.0.1:5050
          BROWSER_HEADLESS: "true"
        run: |
          pip install pytest selenium webdriver-manager
          if pytest tests/test_browser.py -q --tb=no; then
            echo "result=pass" >> "$GITHUB_OUTPUT"
          else
            echo "result=fail" >> "$GITHUB_OUTPUT"
          fi
        continue-on-error: true

      # ── Playwright tests (network mocking, SSE, visual) ───────────────────

      - name: Playwright tests
        id: playwright
        if: steps.stack_health.outcome == 'success'
        run: |
          npx playwright install chromium --with-deps
          if npx playwright test --reporter=list; then
            echo "result=pass" >> "$GITHUB_OUTPUT"
          else
            echo "result=fail" >> "$GITHUB_OUTPUT"
          fi
        continue-on-error: true

      # ── Tear down the prod stack ───────────────────────────────────────────

      - name: Stop production stack
        if: always()
        run: docker compose --profile prod down -v

      # ── Update section 13 of the V&V plan ─────────────────────────────────
      # If E2E or Browser steps were skipped (stack failed to start), the
      # output variable is empty and the || 'blocked' fallback applies.

      - name: Update V&V plan execution summary
        run: |
          python scripts/update_vv_plan.py \
            --python-unit=${{ steps.python_unit.outputs.result }} \
            --integration=${{ steps.integration.outputs.result }} \
            --js=${{ steps.js.outputs.result }} \
            --skills=${{ steps.skills.outputs.result }} \
            --e2e="${{ steps.e2e.outputs.result || 'blocked' }}" \
            --browser="${{ steps.browser.outputs.result || 'blocked' }}" \
            --playwright="${{ steps.playwright.outputs.result || 'blocked' }}"

      # ── Commit the updated file back to the PR branch ─────────────────────

      - name: Commit updated V&V plan
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet docs/vv-test-plan.md; then
            echo "No changes — V&V plan already up to date."
          else
            git add docs/vv-test-plan.md
            git commit -m "chore: update V&V plan execution summary [skip ci]"
            git pull --rebase origin ${{ github.head_ref }} || true
            git push
          fi