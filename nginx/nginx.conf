server {
    listen 80;
    server_name _;

    # ── Hide nginx version ─────────────────────────────────
    server_tokens off;

    # ── Gzip compression ────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # ── Security headers ────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "unsafe-none" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https://is1-ssl.mzstatic.com data:; media-src 'self' https://d3d4yli4hf5bmh.cloudfront.net blob:; connect-src 'self' https://d3d4yli4hf5bmh.cloudfront.net https://itunes.apple.com; worker-src 'self' blob:; frame-ancestors 'self'; form-action 'self'; base-uri 'self'" always;

    # ── Static files (served directly by nginx) ─────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            root /usr/share/nginx/html;
            expires 7d;
            add_header Cache-Control "public, immutable";
            # Re-add security headers (nginx nested location blocks override parent add_header)
            add_header X-Content-Type-Options "nosniff" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
            add_header Cross-Origin-Embedder-Policy "unsafe-none" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        }
    }

    # ── API requests (proxied to gunicorn) ──────────────────
    location /api/ {
        proxy_pass http://app:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ── Health check endpoint ───────────────────────────────
    location /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
