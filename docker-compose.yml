services:
  # ── MySQL Database ──────────────────────────────────────────
  db:
    image: mysql:8.0
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE: ${DB_NAME:-radiocalico}
      MYSQL_USER: ${DB_USER:-rcapp}
      MYSQL_PASSWORD: ${DB_PASSWORD:-radiocalico}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Production: gunicorn (internal, behind nginx) ───────────
  app:
    build:
      context: .
      target: prod
    restart: unless-stopped
    expose:
      - "5000"
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER:-rcapp}
      DB_PASSWORD: ${DB_PASSWORD:-radiocalico}
      DB_NAME: ${DB_NAME:-radiocalico}
      FLASK_HOST: "0.0.0.0"
      FLASK_DEBUG: "false"
      CORS_ORIGIN: ${CORS_ORIGIN:-http://127.0.0.1:5050}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/ratings/summary')"]
      interval: 10s
      timeout: 5s
      retries: 3
    profiles:
      - prod

  # ── Production: nginx (serves static + proxies /api) ────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-5050}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/usr/share/nginx/html:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    profiles:
      - prod

  # ── Development: Flask debug (direct, no nginx) ─────────────
  app-dev:
    build:
      context: .
      target: dev
    ports:
      - "${APP_PORT:-5050}:5000"
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER:-rcapp}
      DB_PASSWORD: ${DB_PASSWORD:-radiocalico}
      DB_NAME: ${DB_NAME:-radiocalico}
      FLASK_HOST: "0.0.0.0"
      FLASK_DEBUG: "true"
      CORS_ORIGIN: "*"
    volumes:
      - ./api:/app/api
      - ./static:/app/static
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 10s
      timeout: 5s
      retries: 3
    profiles:
      - dev

volumes:
  mysql_data:
