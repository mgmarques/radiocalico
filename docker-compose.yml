services:
  # ── MySQL Database ──────────────────────────────────────────
  db:
    image: mysql:8.0
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Production: gunicorn (internal, behind nginx) ───────────
  app:
    build:
      context: .
      target: prod
    restart: unless-stopped
    expose:
      - "5000"
    env_file: .env
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      FLASK_HOST: "0.0.0.0"
      FLASK_DEBUG: "false"
      CORS_ORIGIN: ${CORS_ORIGIN}
      OLLAMA_BASE_URL: "http://ollama:11434/v1"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/ratings/summary')"]
      interval: 10s
      timeout: 5s
      retries: 3
    profiles:
      - prod

  # ── Production: nginx (serves static + proxies /api) ────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-5050}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/usr/share/nginx/html:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    profiles:
      - prod

  # ── Development: Flask debug (direct, no nginx) ─────────────
  app-dev:
    build:
      context: .
      target: dev
    ports:
      - "${APP_PORT:-5050}:5000"
    env_file: .env
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      FLASK_HOST: "0.0.0.0"
      FLASK_DEBUG: "true"
      CORS_ORIGIN: "*"
      OLLAMA_BASE_URL: "http://ollama:11434/v1"
    volumes:
      - ./api:/app/api
      - ./static:/app/static
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 10s
      timeout: 5s
      retries: 3
    profiles:
      - dev

  # ── Ollama LLM (Llama 3.2 for song info) ──────────────────
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 5s
      retries: 5
    profiles:
      - prod
      - dev

  # ── Pull Llama 3.2 model on first startup ────────────────
  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["ollama", "pull", "llama3.2"]
    environment:
      OLLAMA_HOST: "http://ollama:11434"
    profiles:
      - prod
      - dev

volumes:
  mysql_data:
  ollama_data:
